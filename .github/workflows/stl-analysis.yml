name: STL Manufacturing Analysis

on:
  push:
    branches: [ main, feature/phd-engineered-updates ]
    paths:
      - 'design/parts/**/*.stl'
      - 'design/config/*.ini'
      - 'scripts/analyze_stls.py'
  pull_request:
    branches: [ main ]

permissions:
  contents: read # Only needs to read code to perform analysis

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install PrusaSlicer
        run: |
          sudo apt-get update
          sudo apt-get install -y prusa-slicer python3

      - name: Run STL Analysis
        run: python3 scripts/analyze_stls.py

      - name: Upload Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: manufacturing-report
          path: design/MANUFACTURING_REPORT.csv
