name: STL Manufacturing Analysis

on:
  push:
    branches: [ main, v1.5-industrial-parity ]
    paths:
      - 'design/parts/**/*.stl'
      - 'design/config/*.ini'
      - 'scripts/analyze_stls.py'
      - '.github/workflows/stl-analysis.yml'
  pull_request:
    branches: [ main, v1.5-industrial-parity ]

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install PrusaSlicer
        run: |
          sudo apt-get update
          sudo apt-get install -y prusa-slicer python3

      - name: Run STL Analysis
        run: python3 scripts/analyze_stls.py

      - name: Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: manufacturing-report
          path: design/MANUFACTURING_REPORT.csv
