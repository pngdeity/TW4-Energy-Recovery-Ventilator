name: Firmware Logic Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - 'tests/**'
      - '.github/workflows/firmware-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # simple-pid is used by the firmware, we need it for tests too
          # although we could mock it, using the real one is better for logic tests
          pip install simple-pid

      - name: Run tests
        run: |
          pytest tests/
