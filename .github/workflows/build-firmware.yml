name: Build Flashable Firmware (UF2)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model: [tw4, wm12]
    
    steps:
      - name: Checkout OpenERV
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: openerv

      - name: Checkout MicroPython
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: micropython/micropython
          path: micropython
          submodules: recursive

      - name: Install ARM GCC
        uses: carlosperate/arm-none-eabi-gcc-action@8d7d0e968bfcae494bfab7a3657b8a68d0a757ee # v1
        with:
          release: 'latest'

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Build RP2 Port (PICO_W)
        run: |
          cd micropython/ports/rp2
          make BOARD=PICO_W FROZEN_MANIFEST=../../../openerv/firmware/manifest_${{ matrix.model }}.py
          
      - name: Rename Firmware
        run: |
          mv micropython/ports/rp2/build-PICO_W/firmware.uf2 OpenERV_${{ matrix.model }}.uf2

      - name: Upload Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: OpenERV_${{ matrix.model }}_Firmware
          path: OpenERV_${{ matrix.model }}.uf2

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            OpenERV_tw4_Firmware/*.uf2
            OpenERV_wm12_Firmware/*.uf2
          generate_release_notes: true
