name: Build Flashable Firmware (UF2)

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      tw4: ${{ steps.filter.outputs.tw4 }}
      wm12: ${{ steps.filter.outputs.wm12 }}
      any_firmware: ${{ steps.filter.outputs.tw4 == 'true' || steps.filter.outputs.wm12 == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            tw4:
              - 'firmware/tw4/**'
              - 'firmware/common/**'
              - '.github/workflows/build-firmware.yml'
              - 'firmware/manifest_tw4.py'
            wm12:
              - 'firmware/wm12/**'
              - 'firmware/common/**'
              - '.github/workflows/build-firmware.yml'
              - 'firmware/manifest_wm12.py'

  prepare_micropython:
    needs: check_changes
    if: needs.check_changes.outputs.any_firmware == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MicroPython
        uses: actions/checkout@v6
        with:
          repository: micropython/micropython
          path: micropython
          ref: v1.24.1

      - name: Cache mpy-cross
        id: cache-mpy-cross
        uses: actions/cache@v5
        with:
          path: micropython/mpy-cross/build/mpy-cross
          key: ${{ runner.os }}-mpy-cross-v1.24.1

      - name: Build mpy-cross
        if: steps.cache-mpy-cross.outputs.cache-hit != 'true'
        run: make -C micropython/mpy-cross

      - name: Cache MicroPython Submodules
        id: cache-submodules
        uses: actions/cache@v5
        with:
          path: |
            micropython/lib
            micropython/ports/rp2/build-RPI_PICO_W/_deps
          key: ${{ runner.os }}-micropython-submodules-v1.24.1-${{ hashFiles('openerv/.github/workflows/build-firmware.yml') }}

      - name: Initialize MicroPython submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          cd micropython/ports/rp2
          make BOARD=RPI_PICO_W submodules

  build:
    needs: [check_changes, prepare_micropython]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [tw4, wm12]
    
    steps:
      - name: Skip Logic
        id: skip_check
        run: |
          HAS_CHANGES="${{ needs.check_changes.outputs[matrix.model] }}"
          IS_TAG="${{ startsWith(github.ref, 'refs/tags/v') }}"
          IS_DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"
          if [[ "$HAS_CHANGES" == "true" || "$IS_TAG" == "true" || "$IS_DISPATCH" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout OpenERV
        if: steps.skip_check.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          path: openerv

      - name: Checkout MicroPython
        if: steps.skip_check.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          repository: micropython/micropython
          path: micropython
          ref: v1.24.1

      - name: Restore mpy-cross
        if: steps.skip_check.outputs.should_run == 'true'
        uses: actions/cache/restore@v5
        with:
          path: micropython/mpy-cross/build/mpy-cross
          key: ${{ runner.os }}-mpy-cross-v1.24.1
          fail-on-cache-miss: true

      - name: Restore MicroPython Submodules
        if: steps.skip_check.outputs.should_run == 'true'
        uses: actions/cache/restore@v5
        with:
          path: |
            micropython/lib
            micropython/ports/rp2/build-RPI_PICO_W/_deps
          key: ${{ runner.os }}-micropython-submodules-v1.24.1-${{ hashFiles('openerv/.github/workflows/build-firmware.yml') }}
          fail-on-cache-miss: true

      - name: Install ARM GCC
        if: steps.skip_check.outputs.should_run == 'true'
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 'latest'

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_run == 'true'
        run: python3 -m pip install pyelftools

      - name: Build RP2 Port (RPI_PICO_W)
        if: steps.skip_check.outputs.should_run == 'true'
        run: |
          cd micropython/ports/rp2
          make BOARD=RPI_PICO_W \
               FROZEN_MANIFEST=$GITHUB_WORKSPACE/openerv/firmware/manifest_${{ matrix.model }}.py \
               USER_C_MODULES=
          
      - name: Rename Firmware
        if: steps.skip_check.outputs.should_run == 'true'
        run: |
          mv micropython/ports/rp2/build-RPI_PICO_W/firmware.uf2 OpenERV_${{ matrix.model }}.uf2

      - name: Upload Artifact
        if: steps.skip_check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: OpenERV_${{ matrix.model }}_Firmware
          path: OpenERV_${{ matrix.model }}.uf2

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() && 
      (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true')
    steps:
      - name: Checkout OpenERV (for BOMs)
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'v0.1-manual' }}
          files: |
            OpenERV_tw4_Firmware/*.uf2
            OpenERV_wm12_Firmware/*.uf2
            design/BOM_*.csv
            design/MANUFACTURING_REPORT.csv
          generate_release_notes: true
          draft: false
          prerelease: false
